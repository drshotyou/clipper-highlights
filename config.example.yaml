transcription:
  model: medium.en
  device: auto
  compute_type: int8_float16
  hotwords:
    - pmc
    - scav
    - extract
    - one shot
    - i'm down

audio:
  sample_rate: 16000
  min_dbfs: -42.0
  combined_threshold: 2.3

candidate:
