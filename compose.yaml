services:
  clipper-highlights:
    build:
      context: .
      dockerfile: Dockerfile
    image: clipper-highlights:local
    working_dir: /workspace
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      HF_HOME: /cache/huggingface
      XDG_CACHE_HOME: /cache
      PYTHONPATH: /workspace/src
    volumes:
      - type: bind
        source: .
        target: /workspace
      - type: bind
        source: ${CLIPPER_MEDIA_DIR:-./data}
        target: /data
      - type: volume
        source: clipper-cache
        target: /cache
    command: ["--help"]

volumes:
  clipper-cache:
